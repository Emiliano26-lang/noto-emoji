name: Build & Release Hot Face Emoji

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-emoji:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .github/workflows/package.json

      - name: Validate assets
        run: |
          echo "Checking new 🥵 Hot Face assets..."
          ls svg/U+1F975.svg
          ls png/512/U+1F975.png

      - name: Build Noto Emoji font
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hot-face-fonts
          path: build/fonts/*

  release:
    needs: build-emoji
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hot-face-fonts
          path: release/fonts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.7
          name: "Hot Face Emoji Update"
          body: |
            🥵 Hot Face emoji updated to new design:
            - Tongue out
            - Sweat drop
            - Wide eyes
          files: release/fonts/*
