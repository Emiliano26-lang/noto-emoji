name: Build Emoji

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-emoji:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify package.json exists
        run: |
          if [ ! -f ./package.json ]; then
            echo "package.json not found in root. Check workflow path."
            exit 1
          fi

      - name: Install dependencies
        run: npm install
        working-directory: ./   # ✅ adjust if package.json is in a subfolder

      - name: Run build
        run: npm run build
        working-directory: ./   # ✅ same folder as package.json

      - name: Run tests
        run: npm test
        working-directory: ./

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./dist
